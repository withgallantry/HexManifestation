name: Build and Upload Release Jar

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload jar to (for example v0.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Collect release jar
        run: |
          mkdir -p dist
          find build/libs -maxdepth 1 -type f -name "*.jar" ! -name "*-sources.jar" -exec cp {} dist/ \;

      - name: Upload jar to release
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.jar
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
          fail_on_unmatched_files: true
          overwrite_files: true